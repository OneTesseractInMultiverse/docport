name: CI and PyPI release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI now"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  quality:
    name: Quality and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install project and dev dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format
        run: uv run ruff format --check src tests

      - name: Mypy
        run: uv run mypy src

      - name: Unit tests with coverage gate
        run: uv run pytest -vv --cov=docport --cov-branch --cov-fail-under=100

  build-and-publish:
    name: Build and publish to PyPI
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true') ||
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install project
        run: uv sync --group dev

      - name: Build package
        run: uv run --with build python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
